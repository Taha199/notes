name: Apply quiz folder reorder patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/quiz-folder-reorder-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Patch QuizPage
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/components/quiz/QuizPage.tsx')
          text = path.read_text()

          old = "const { quizzes, quizSets: allQuizSets, quizFolders: allQuizFolders, addQuiz, deleteQuiz, updateQuiz, addQuizSet, deleteQuizSet, renameQuizSet, reorderQuizSets, setQuizSetColor, setQuizSetFolder, addQuizFolder, renameQuizFolder, setQuizFolderColor, deleteQuizFolder, addItemToSet, removeItemFromSet, updateItemInSet } = useNotes();"
          new = "const { quizzes, quizSets: allQuizSets, quizFolders: allQuizFolders, addQuiz, deleteQuiz, updateQuiz, addQuizSet, deleteQuizSet, renameQuizSet, reorderQuizSets, setQuizSetColor, setQuizSetFolder, addQuizFolder, renameQuizFolder, reorderQuizFolders, setQuizFolderColor, deleteQuizFolder, addItemToSet, removeItemFromSet, updateItemInSet } = useNotes();"
          text = text.replace(old, new)

          old = "  const dragSetId = useRef<string | null>(null);\n  const [dragOverSetId, setDragOverSetId] = useState<string | null>(null);\n  const [dragOverFolderId, setDragOverFolderId] = useState<string | null>(null);"
          new = "  const dragSetId = useRef<string | null>(null);\n  const dragFolderId = useRef<string | null>(null);\n  const [dragOverSetId, setDragOverSetId] = useState<string | null>(null);\n  const [dragOverFolderId, setDragOverFolderId] = useState<string | null>(null);\n  const [dragOverFolderSortId, setDragOverFolderSortId] = useState<string | null>(null);"
          text = text.replace(old, new)

          old = "onDragEnd={() => { dragSetId.current = null; setDragOverSetId(null); setDragOverFolderId(null); }}"
          new = "onDragEnd={() => { dragSetId.current = null; setDragOverSetId(null); setDragOverFolderId(null); setDragOverFolderSortId(null); }}"
          text = text.replace(old, new)

          old = """                  <button
                    onClick={() => setSelectedFolderId(f.id)}
                    onContextMenu={(e) => {"""
          new = """                  <button
                    draggable={!f.system}
                    onDragStart={(e) => {
                      if (f.system) return;
                      dragFolderId.current = f.id;
                      e.dataTransfer.effectAllowed = 'move';
                      e.dataTransfer.setData('application/x-quiz-folder', f.id);
                    }}
                    onClick={() => setSelectedFolderId(f.id)}
                    onContextMenu={(e) => {"""
          text = text.replace(old, new)

          old = """                    onDragOver={(e) => {
                      if (!dragSetId.current) return;
                      e.preventDefault();
                      e.stopPropagation();
                      e.dataTransfer.dropEffect = 'move';
                      setDragOverFolderId(f.id);
                    }}"""
          new = """                    onDragOver={(e) => {
                      const folderId = dragFolderId.current || e.dataTransfer.getData('application/x-quiz-folder');
                      if (folderId) {
                        if (f.system) return;
                        e.preventDefault();
                        e.stopPropagation();
                        e.dataTransfer.dropEffect = 'move';
                        setDragOverFolderSortId(f.id);
                        return;
                      }
                      if (!dragSetId.current) return;
                      e.preventDefault();
                      e.stopPropagation();
                      e.dataTransfer.dropEffect = 'move';
                      setDragOverFolderId(f.id);
                    }}"""
          text = text.replace(old, new)

          old = """                    onDragLeave={(e) => {
                      if (!e.currentTarget.contains(e.relatedTarget as Node | null)) setDragOverFolderId(null);
                    }}"""
          new = """                    onDragLeave={(e) => {
                      if (!e.currentTarget.contains(e.relatedTarget as Node | null)) {
                        setDragOverFolderId(null);
                        setDragOverFolderSortId(null);
                      }
                    }}"""
          text = text.replace(old, new)

          old = """                    onDrop={(e) => {
                      e.preventDefault();
                      e.stopPropagation();
                      const setId = dragSetId.current || e.dataTransfer.getData('text/plain');
                      if (setId) {
                        setQuizSetFolder(setId, f.id);
                        if (setSort !== 'manual') changeSort('manual');
                        setSelectedFolderId(f.id);
                      }
                      dragSetId.current = null;
                      setDragOverSetId(null);
                      setDragOverFolderId(null);
                    }}"""
          new = """                    onDrop={(e) => {
                      e.preventDefault();
                      e.stopPropagation();
                      const folderId = dragFolderId.current || e.dataTransfer.getData('application/x-quiz-folder');
                      if (folderId) {
                        reorderQuizFolders(folderId, f.id);
                        dragFolderId.current = null;
                        setDragOverFolderSortId(null);
                        return;
                      }
                      const setId = dragSetId.current || e.dataTransfer.getData('text/plain');
                      if (setId) {
                        setQuizSetFolder(setId, f.id);
                        if (setSort !== 'manual') changeSort('manual');
                        setSelectedFolderId(f.id);
                      }
                      dragSetId.current = null;
                      setDragOverSetId(null);
                      setDragOverFolderId(null);
                      setDragOverFolderSortId(null);
                    }}
                    onDragEnd={() => { dragFolderId.current = null; setDragOverFolderSortId(null); }}"""
          text = text.replace(old, new)

          old = """                    className={'relative w-full py-2.5 pl-3 pr-1 text-left transition-all ' +
                      (dragOverFolderId === f.id
                        ? 'bg-primary/20 ring-2 ring-inset ring-primary dark:bg-primary/30'
                        : selectedFolderId === f.id"""
          new = """                    className={'relative w-full py-2.5 pl-3 pr-1 text-left transition-all ' +
                      (dragOverFolderSortId === f.id
                        ? 'bg-primary/10 ring-2 ring-inset ring-primary/70 dark:bg-primary/20'
                        : dragOverFolderId === f.id
                          ? 'bg-primary/20 ring-2 ring-inset ring-primary dark:bg-primary/30'
                          : selectedFolderId === f.id"""
          text = text.replace(old, new)

          old = """                    <span className=\"absolute inset-y-0 left-0 w-[3px]\" style={{ backgroundColor: f.color || '#9ca3af' }} />
                    <span title={f.system === 'favorites' ? 'Favoriter' : f.system ? (lang === 'sv' ? 'Återställda set' : 'Restored Sets') : f.name} className={'block truncate text-[11px] font-semibold ' + (selectedFolderId === f.id ? 'text-primary' : 'text-app-text dark:text-gray-200')}>"""
          new = """                    <span className=\"absolute inset-y-0 left-0 w-[3px]\" style={{ backgroundColor: f.color || '#9ca3af' }} />
                    {!f.system && (
                      <span className=\"absolute right-1 bottom-1 select-none text-[12px] text-app-text-secondary/20 opacity-0 transition-opacity group-hover/fl:opacity-100\">⠿</span>
                    )}
                    <span title={f.system === 'favorites' ? 'Favoriter' : f.system ? (lang === 'sv' ? 'Återställda set' : 'Restored Sets') : f.name} className={'block truncate text-[11px] font-semibold ' + (selectedFolderId === f.id ? 'text-primary' : 'text-app-text dark:text-gray-200')}>"""
          text = text.replace(old, new)

          path.write_text(text)
          PY
      - name: Build
        run: |
          npm ci
          npm run build
      - name: Commit patch and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/quiz-folder-reorder-patch.yml
          git add src/components/quiz/QuizPage.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Enable quiz folder reordering"
          git push origin main
