name: Apply pending Codex upload

on:
  push:
    paths:
      - .github/workflows/apply-pending-codex-upload.yml
      - .github/codex-pending.patch.b64
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply pending changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Codex"
          git config user.email "codex@users.noreply.github.com"
          base64 -d .github/codex-pending.patch.b64 > /tmp/pending.patch
          git apply /tmp/pending.patch
          rm -f .github/workflows/apply-pending-codex-upload.yml .github/codex-pending.patch.b64
          git add api/admin-users.js src/components/admin/AdminPanel.tsx src/components/notes/RichTextEditor.tsx src/contexts/NotesContext.tsx .github/workflows/apply-pending-codex-upload.yml .github/codex-pending.patch.b64
          git commit -m "Apply admin and editor fixes"
          git push
